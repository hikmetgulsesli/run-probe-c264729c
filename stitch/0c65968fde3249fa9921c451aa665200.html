<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Run Probe - Status Utility</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Geist & Geist Mono -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&amp;family=Geist:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#cbdbf5",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#4edea3",
                        "secondary-container": "#6cf8bb",
                        "primary": "#003ec7",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b7c4ff",
                        "primary-container": "#0052ff",
                        "secondary": "#006c49",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#ffdfbe",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-container": "#e5eeff",
                        "on-secondary-fixed-variant": "#005236",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#002113",
                        "on-background": "#0b1c30",
                        "on-surface": "#0b1c30",
                        "surface-variant": "#d3e4fe",
                        "surface-tint": "#004ced",
                        "background": "#f8f9ff",
                        "on-secondary-container": "#00714d",
                        "on-primary-fixed": "#001452",
                        "on-primary-container": "#dfe3ff",
                        "on-surface-variant": "#434656",
                        "surface-bright": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "tertiary-fixed": "#ffddb8",
                        "inverse-surface": "#213145",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container-high": "#dce9ff",
                        "tertiary-container": "#905a00",
                        "tertiary": "#6f4500",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c3c5d9",
                        "primary-fixed": "#dde1ff",
                        "outline": "#737688",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#b7c4ff",
                        "on-primary-fixed-variant": "#0038b6",
                        "surface-container-low": "#eff4ff",
                        "surface": "#f8f9ff",
                        "on-tertiary-fixed": "#2a1700",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary-fixed-dim": "#ffb95f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "container-padding": "24px",
                        "stack-md": "16px",
                        "gutter": "16px",
                        "unit": "4px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Geist"],
                        "body-sm": ["Geist"],
                        "headline-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "body-md": ["Geist"],
                        "label-md": ["Geist"],
                        "mono-sm": ["Geist Mono"]
                    },
                    "fontSize": {
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "mono-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest border-b border-outline-variant full-width top-0 docked z-50">
<div class="flex justify-between items-center h-16 px-container-padding w-full max-w-7xl mx-auto">
<div class="font-headline-md text-headline-md font-bold text-primary flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">speed</span>
                Run Probe
            </div>
<!-- Navigation Suppressed: Task-Focused Linear Flow -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-container-padding md:p-stack-lg w-full max-w-3xl mx-auto">
<!-- Offline Banner (Simulated State) -->
<div class="hidden w-full bg-error-container text-on-error-container border border-error/20 p-stack-sm rounded mb-stack-md flex items-center justify-center gap-2 font-label-md text-label-md" id="offlineBanner">
<span class="material-symbols-outlined text-sm">wifi_off</span>
            Local state check failed. Retrying...
        </div>
<div class="w-full flex flex-col gap-stack-lg">
<!-- Status Section -->
<section class="flex flex-col gap-stack-sm w-full">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-unit">Current Metrics</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-stack-sm">
<!-- System Heartbeat Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-stack-sm flex items-center justify-between rounded shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<span class="font-body-md text-body-md text-on-surface">Heartbeat</span>
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-secondary-container relative">
<div class="absolute inset-0 rounded-full bg-secondary-container animate-ping opacity-75"></div>
</div>
<span class="font-mono-sm text-mono-sm text-secondary">Active</span>
</div>
</div>
<!-- Latency Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-stack-sm flex items-center justify-between rounded shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<span class="font-body-md text-body-md text-on-surface">Latency</span>
<span class="font-mono-sm text-mono-sm text-on-surface-variant">12ms</span>
</div>
<!-- Uptime Card -->
<div class="bg-surface-container-lowest border border-outline-variant p-stack-sm flex items-center justify-between rounded shadow-[0_4px_12px_rgba(0,0,0,0.02)]">
<span class="font-body-md text-body-md text-on-surface">Uptime</span>
<span class="font-mono-sm text-mono-sm text-on-surface-variant">99.98%</span>
</div>
</div>
</section>
<!-- Control Section -->
<section class="flex flex-col md:flex-row items-center justify-between bg-surface-container-lowest border border-outline-variant p-stack-md rounded gap-stack-md w-full">
<div class="flex flex-col gap-unit w-full md:w-auto">
<button class="bg-primary text-on-primary font-label-md text-label-md py-2 px-4 rounded hover:bg-primary-container transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 flex items-center justify-center gap-2" id="refreshBtn" onclick="handleRefresh()">
<span class="material-symbols-outlined text-sm transition-transform duration-500" id="refreshIcon">refresh</span>
                        Refresh Status
                    </button>
<span class="font-mono-sm text-mono-sm text-outline block text-center md:text-left mt-1" id="lastUpdatedStr">Last updated: Just now</span>
</div>
<div class="h-px w-full md:w-px md:h-12 bg-outline-variant/50 block"></div>
<div class="flex items-center justify-between w-full md:w-auto gap-stack-sm">
<span class="font-body-md text-body-md text-on-surface" id="systemStateLabel">System Ready</span>
<!-- Minimalist Toggle -->
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" id="systemToggle" onchange="handleToggle()" type="checkbox" value=""/>
<div class="w-9 h-5 bg-outline-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</section>
</div>
</main>
<script>
        // Simulate minor interactions
        function handleRefresh() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('rotate-180');
            
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                icon.classList.remove('rotate-180');
                btn.disabled = false;
                btn.classList.remove('opacity-80');
                updateTimestamp();
            }, 800);
        }

        function handleToggle() {
            const toggle = document.getElementById('systemToggle');
            const label = document.getElementById('systemStateLabel');
            
            if (toggle.checked) {
                label.textContent = "System Ready";
                label.classList.remove('text-on-surface-variant');
                label.classList.add('text-on-surface');
            } else {
                label.textContent = "System Paused";
                label.classList.add('text-on-surface-variant');
                label.classList.remove('text-on-surface');
            }
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second:'2-digit' });
            document.getElementById('lastUpdatedStr').textContent = `Last updated: ${timeStr}`;
        }

        // Initialize timestamp
        updateTimestamp();

        // Simulate random offline edge case for demonstration
        setTimeout(() => {
            if(Math.random() > 0.7) {
                document.getElementById('offlineBanner').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('offlineBanner').classList.add('hidden');
                }, 4000);
            }
        }, 5000);
    </script>
</body></html>
